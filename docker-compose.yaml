services:
  fraud-api:
    build: .
    container_name: real-time-fraud-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./artifacts:/app/artifacts
      - ./config:/app/config:ro
    environment:
      - PYTHONPATH=/app/src
      - MLFLOW_TRACKING_URI=/app/mlruns
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
